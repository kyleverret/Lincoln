name: Deploy — DigitalOcean App Platform

# Triggers on push to main, after CI passes.
# Required repository secrets:
#   DIGITALOCEAN_ACCESS_TOKEN  — DO personal access token (read/write registry + apps)
#   DO_APP_ID                  — App Platform app ID (from `doctl apps list`)
# Required repository variables:
#   DOCR_REGISTRY              — DigitalOcean Container Registry name (e.g. "my-registry")

on:
  push:
    branches: [main]

concurrency:
  group: deploy-do-${{ github.ref }}
  cancel-in-progress: false    # never cancel a running deploy mid-flight

jobs:
  # -------------------------------------------------------------------------
  # 1. Run CI gate (reuses the existing ci.yml checks)
  # -------------------------------------------------------------------------
  ci:
    uses: ./.github/workflows/ci.yml

  # -------------------------------------------------------------------------
  # 2. Build image, push to DOCR, deploy to App Platform
  # -------------------------------------------------------------------------
  deploy:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Authenticate to DigitalOcean
      # ------------------------------------------------------------------
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1800

      # ------------------------------------------------------------------
      # Build and push image
      # ------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to DOCR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            registry.digitalocean.com/${{ vars.DOCR_REGISTRY }}/lincoln:sha-${{ github.sha }}
            registry.digitalocean.com/${{ vars.DOCR_REGISTRY }}/lincoln:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      # ------------------------------------------------------------------
      # Scan pushed image for vulnerabilities
      # ------------------------------------------------------------------
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: registry.digitalocean.com/${{ vars.DOCR_REGISTRY }}/lincoln:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"   # fail the deploy if CRITICAL or HIGH CVEs are found

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # ------------------------------------------------------------------
      # Deploy to App Platform using the new image digest
      # ------------------------------------------------------------------
      - name: Get image digest
        id: image
        run: |
          DIGEST=$(docker buildx imagetools inspect \
            registry.digitalocean.com/${{ vars.DOCR_REGISTRY }}/lincoln:sha-${{ github.sha }} \
            --format '{{.Manifest.Digest}}')
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Trigger App Platform deployment
        run: |
          doctl apps create-deployment ${{ secrets.DO_APP_ID }} \
            --wait \
            --no-cache \
            --force-rebuild

      # ------------------------------------------------------------------
      # Post-deploy health check
      # ------------------------------------------------------------------
      - name: Wait for health check to pass
        run: |
          APP_URL=$(doctl apps get ${{ secrets.DO_APP_ID }} --format LiveURL --no-header)
          echo "App URL: $APP_URL"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/api/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 10 attempts."
          exit 1

      - name: Report deployment summary
        if: success()
        run: |
          APP_URL=$(doctl apps get ${{ secrets.DO_APP_ID }} --format LiveURL --no-header)
          echo "### Deployment successful" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`sha-${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** $APP_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
