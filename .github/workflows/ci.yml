# ============================================================
# Lincoln — Continuous Integration
#
# Triggers: every pull request and push to main
#
# Steps:
#   1. Dependency audit (npm audit)
#   2. TypeScript type check
#   3. ESLint
#   4. Prisma schema validation
#   5. Docker image build (validates Dockerfile)
#   6. Trivy container vulnerability scan
# ============================================================

name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

# Least-privilege permissions for the workflow token
permissions:
  contents: read
  security-events: write   # for uploading SARIF results to GitHub Security
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------
  # 1. Dependency security audit
  # ----------------------------------------------------------
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: npm audit (high + critical)
        run: npm audit --audit-level=high --production

  # ----------------------------------------------------------
  # 2. Type check + Lint
  # ----------------------------------------------------------
  lint:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://user:password@localhost:5432/dummy"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint . --max-warnings=0

  # ----------------------------------------------------------
  # 3. Prisma schema validation
  # ----------------------------------------------------------
  prisma-validate:
    name: Validate Prisma Schema
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "postgresql://user:password@localhost:5432/dummy"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Check Prisma format
        run: npx prisma format --check

  # ----------------------------------------------------------
  # 4. Build & Container Security Scan
  # ----------------------------------------------------------
  build-and-scan:
    name: Build & Container Scan
    runs-on: ubuntu-latest
    needs: [audit, lint, prisma-validate]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: lincoln:ci-${{ github.sha }}
          # Use GitHub Actions cache for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build arg for Next.js telemetry
          build-args: |
            NEXT_TELEMETRY_DISABLED=1

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: lincoln:ci-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          # Fail the build on fixable critical vulnerabilities
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: container-scan

  # ----------------------------------------------------------
  # 5. Secret scanning (no hardcoded credentials)
  # ----------------------------------------------------------
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
