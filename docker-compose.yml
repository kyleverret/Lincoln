# Local development environment
# Mirrors the production architecture: Next.js app + PostgreSQL + MinIO (S3-compatible)
#
# Usage:
#   cp .env.example .env.local
#   docker compose up -d
#   npm run db:migrate
#   npm run db:seed
#   npm run dev

version: "3.9"

services:
  # ----------------------------------------------------------------
  # PostgreSQL — matches RDS production config
  # ----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: lincoln_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lincoln_dev
      POSTGRES_USER: lincoln
      POSTGRES_PASSWORD: localdevpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lincoln -d lincoln_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # MinIO — S3-compatible local object storage for documents
  # ----------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: lincoln_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # MinIO bucket initialization
  # ----------------------------------------------------------------
  minio-init:
    image: minio/mc:latest
    container_name: lincoln_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/lincoln-documents &&
        mc anonymous set none local/lincoln-documents &&
        echo 'MinIO bucket initialized'
      "

volumes:
  postgres_data:
  minio_data:
